<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Авито Видное — Marketplace</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ===== ПОЛНЫЕ СТИЛИ (как в предыдущей финальной версии, для краткости опущены) ===== */
        /* В реальном коде здесь должны быть все стили из предыдущей рабочей версии */
        /* Я их не дублирую из-за ограничения, но они должны быть полностью скопированы */
    </style>
</head>
<body>
    <!-- вся вёрстка такая же, как в последней полной версии, включая модалки -->
    <!-- ... -->
    <script>
        // ---------- Telegram WebApp ----------
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ---------- Конфигурация ----------
        const MY_ADMIN_ID = 5697184715;   // ЗАМЕНИТЕ НА СВОЙ ID
        const SYSTEM_USER_ID = 'system_avito';
        const SYSTEM_USER_NAME = 'Авито Видное';
        const SYSTEM_AVATAR = '📢';
        const CRYPTO_BOT_USERNAME = 'CryptoBot';

        const CATEGORIES = [
            {id:'auto', name:'🚗 Авто'}, {id:'re', name:'🏠 Недвижимость'},
            {id:'electr', name:'💻 Техника'}, {id:'hobby', name:'🎸 Хобби'},
            {id:'games', name:'🎮 Игры'}, {id:'photo', name:'📸 Фото/Видео'},
            {id:'sport', name:'⚽ Спорт'}, {id:'other', name:'📦 Прочее'}
        ];

        // ---------- Данные пользователя ----------
        const user = tg.initDataUnsafe?.user;
        if (!user) {
            document.body.innerHTML = '<div style="padding:20px;text-align:center;">❌ Ошибка: приложение не запущено через Telegram. Откройте через кнопку бота.</div>';
            throw new Error('No user data');
        }

        const userId = user.id.toString();
        const isAdmin = (userId === MY_ADMIN_ID.toString());

        let users = JSON.parse(localStorage.getItem('avito_users')) || {};
        let currentUser = users[userId];
        if (!currentUser) {
            currentUser = {
                id: userId,
                name: `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Пользователь',
                login: user.username ? `@${user.username}` : `user_${userId.slice(-6)}`,
                avatar: user.photo_url ? `<img src="${user.photo_url}">` : (user.first_name ? user.first_name[0].toUpperCase() : '👤'),
                stars: 100,
                spent: 0,
                role: isAdmin ? 'admin' : 'user',
                status: 'active',
                blockReason: '',
                referrals: [],
                registered: new Date().toLocaleDateString()
            };
            users[userId] = currentUser;
            localStorage.setItem('avito_users', JSON.stringify(users));
        } else {
            currentUser.name = `${user.first_name || ''} ${user.last_name || ''}`.trim() || currentUser.name;
            currentUser.login = user.username ? `@${user.username}` : currentUser.login;
            if (user.photo_url) currentUser.avatar = `<img src="${user.photo_url}">`;
            users[userId] = currentUser;
            localStorage.setItem('avito_users', JSON.stringify(users));
        }

        // Системный пользователь
        if (!users[SYSTEM_USER_ID]) {
            users[SYSTEM_USER_ID] = {
                id: SYSTEM_USER_ID,
                name: SYSTEM_USER_NAME,
                login: '@avito_vidnoe',
                avatar: SYSTEM_AVATAR,
                stars: 0,
                role: 'system'
            };
            localStorage.setItem('avito_users', JSON.stringify(users));
        }

        let items = JSON.parse(localStorage.getItem('avito_items')) || [];
        let favorites = JSON.parse(localStorage.getItem(`avito_fav_${userId}`)) || [];
        let chats = JSON.parse(localStorage.getItem(`avito_chats_${userId}`)) || [];
        let transactions = JSON.parse(localStorage.getItem(`avito_trans_${userId}`)) || [];

        // Создаём системный чат
        let systemChat = chats.find(c => c.with === SYSTEM_USER_ID);
        if (!systemChat) {
            systemChat = {
                id: Date.now(),
                with: SYSTEM_USER_ID,
                withName: SYSTEM_USER_NAME,
                withAvatar: SYSTEM_AVATAR,
                messages: []
            };
            chats.push(systemChat);
            localStorage.setItem(`avito_chats_${userId}`, JSON.stringify(chats));
        }

        if (currentUser.status === 'blocked') {
            document.body.innerHTML = `
                <div class="blocked-screen">
                    <div class="icon">⛔</div>
                    <h2>Доступ заблокирован</h2>
                    <div class="reason">${currentUser.blockReason || 'Нарушение правил платформы'}</div>
                    <div style="margin-top:20px;">По вопросам: @avito_vidnoe_support</div>
                </div>
            `;
            throw new Error('User blocked');
        }

        function saveData() {
            localStorage.setItem('avito_items', JSON.stringify(items));
            localStorage.setItem(`avito_fav_${userId}`, JSON.stringify(favorites));
            localStorage.setItem(`avito_chats_${userId}`, JSON.stringify(chats));
            localStorage.setItem(`avito_trans_${userId}`, JSON.stringify(transactions));
            users[userId] = currentUser;
            localStorage.setItem('avito_users', JSON.stringify(users));
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function updateUI() {
            document.getElementById('menuStars').innerText = currentUser.stars;
            document.getElementById('starsAmount').innerText = currentUser.stars;
            document.getElementById('profileIcon').innerHTML = currentUser.avatar;
            document.getElementById('menuAvatar').innerHTML = currentUser.avatar;
            document.getElementById('menuName').innerText = currentUser.name;
            document.getElementById('menuLogin').innerText = currentUser.login;
            if (isAdmin) document.getElementById('adminMenuItem').style.display = 'flex';
            const myCount = items.filter(i => i.sellerId === userId && i.moderation === 'approved').length;
            document.getElementById('menuMyItems').innerText = myCount;
            document.getElementById('menuFav').innerText = favorites.length;
            document.getElementById('menuChats').innerText = chats.length;
        }

        // ---------- Отправка уведомления через сервер ----------
        async function sendNotificationToBot(targetUserId, type, data) {
            try {
                await fetch('/send-notification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: targetUserId, type, data })
                });
            } catch (err) {
                console.error('Ошибка отправки уведомления:', err);
            }
        }

        // ---------- Системные уведомления в чат ----------
        function sendSystemNotification(targetUserId, message) {
            let userChats = JSON.parse(localStorage.getItem(`avito_chats_${targetUserId}`) || '[]');
            let sysChat = userChats.find(c => c.with === SYSTEM_USER_ID);
            if (!sysChat) {
                sysChat = {
                    id: Date.now(),
                    with: SYSTEM_USER_ID,
                    withName: SYSTEM_USER_NAME,
                    withAvatar: SYSTEM_AVATAR,
                    messages: []
                };
                userChats.push(sysChat);
            }
            sysChat.messages.push({
                text: message,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                type: 'system'
            });
            localStorage.setItem(`avito_chats_${targetUserId}`, JSON.stringify(userChats));
        }

        // ========== ОПЛАТА TELEGRAM STARS ==========
        let pendingStarsPayment = false;
        function buyStarsTelegram(amount) {
            if (pendingStarsPayment) { toast('⏳ Оплата уже обрабатывается'); return; }
            pendingStarsPayment = true;
            const invoiceId = `stars_${userId}_${amount}_${Date.now()}`;
            tg.sendInvoice(
                `Покупка ${amount} Stars`,
                `Пополнение баланса для продвижения`,
                invoiceId,
                "",
                "XTR",
                [{ label: `${amount} Stars`, amount: amount }]
            );
            tg.onEvent('invoiceClosed', (invoice) => {
                pendingStarsPayment = false;
                if (invoice.status === 'paid') {
                    currentUser.stars += amount;
                    transactions.unshift({ desc: `Покупка ${amount} ⭐ (Telegram)`, date: new Date().toLocaleDateString(), amount });
                    saveData(); updateUI();
                    sendSystemNotification(userId, `💰 Пополнение баланса: +${amount} ⭐. Новый баланс: ${currentUser.stars} ⭐`);
                    toast(`✅ +${amount} ⭐ успешно зачислено!`);
                    closeStars();
                } else if (invoice.status === 'failed') toast('❌ Ошибка оплаты');
                else if (invoice.status === 'cancelled') toast('❌ Оплата отменена');
            });
        }
        function buyStarsTelegramCustom() {
            let a = parseInt(document.getElementById('customStars').value);
            if (a > 0 && a <= 5000) buyStarsTelegram(a);
            else toast('❌ Введите число от 1 до 5000');
        }

        // ========== ОПЛАТА CRYPTO BOT ==========
        async function buyStarsCrypto(amount) {
            const rub = Math.ceil(amount * 1.4);
            try {
                const response = await fetch('/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: rub, asset: 'RUB', userId: userId, stars: amount })
                });
                const data = await response.json();
                if (data.ok && data.invoice_url) {
                    localStorage.setItem(`pending_crypto_${userId}`, JSON.stringify({ invoice_id: data.invoice_id, stars: amount }));
                    tg.openTelegramLink(data.invoice_url);
                    toast('💸 Оплата в CryptoBot. После оплаты нажмите "Проверить оплату"');
                    showCryptoCheckButton();
                } else {
                    toast('❌ Ошибка создания счёта');
                }
            } catch (err) {
                toast('❌ Сервер недоступен');
            }
        }
        function buyStarsCryptoCustom() {
            let a = parseInt(document.getElementById('customStars').value);
            if (a > 0 && a <= 5000) buyStarsCrypto(a);
            else toast('❌ Введите число от 1 до 5000');
        }
        function showCryptoCheckButton() {
            const modalContent = document.querySelector('#starsModal .modal-content');
            let existingBtn = document.getElementById('cryptoCheckBtn');
            if (existingBtn) existingBtn.remove();
            const btn = document.createElement('button');
            btn.id = 'cryptoCheckBtn';
            btn.className = 'btn btn-outline';
            btn.innerText = '🔄 Проверить оплату';
            btn.style.marginTop = '10px';
            btn.onclick = checkCryptoPayment;
            modalContent.appendChild(btn);
        }
        async function checkCryptoPayment() {
            const pending = localStorage.getItem(`pending_crypto_${userId}`);
            if (!pending) { toast('Нет активной оплаты'); return; }
            const { invoice_id, stars } = JSON.parse(pending);
            try {
                const res = await fetch('/check-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ invoice_id })
                });
                const data = await res.json();
                if (data.status === 'paid') {
                    currentUser.stars += stars;
                    transactions.unshift({ desc: `Покупка ${stars} ⭐ (Crypto)`, date: new Date().toLocaleDateString(), amount: stars });
                    saveData(); updateUI();
                    toast(`✅ +${stars} ⭐ зачислено!`);
                    localStorage.removeItem(`pending_crypto_${userId}`);
                    document.getElementById('cryptoCheckBtn')?.remove();
                    closeStars();
                } else {
                    toast('⏳ Оплата ещё не получена. Попробуйте позже.');
                }
            } catch (err) {
                toast('❌ Ошибка проверки');
            }
        }

        // ========== ОСТАЛЬНЫЕ ФУНКЦИИ (рендер, добавление, чаты, админка) ==========
        // Здесь должны быть все функции из предыдущей полной версии, включая:
        // render, filterCat, doSearch, handlePhoto, togglePremium, openAdd, closeAdd, validateAddForm, submitItem,
        // openDetail, closeDetail, toggleFav, showFavorites, closeFavorites, openChat, renderChatModal, sendChatMessage,
        // closeChatDetail, showChats, closeChats, showReferrals, closeReferrals, showMyItems, closeMyItems, deleteItem,
        // showAdmin, closeAdmin, openModerate, closeModerate, approveItem, rejectItemWithReason, openBlockUser, closeBlock, confirmBlock,
        // toggleTheme, toggleMenu, closeMenu, initFilters, recalcLikes

        // Для краткости я не дублирую их, но в реальном файле они должны быть полностью скопированы из предыдущей рабочей версии.
        // Вместо этого я приведу изменённые функции, которые теперь отправляют уведомления через сервер:

        // ---------- МОДИФИЦИРОВАННЫЕ ФУНКЦИИ С ОТПРАВКОЙ УВЕДОМЛЕНИЙ ----------
        // В sendChatMessage добавляем отправку уведомления получателю
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            if (!input || !input.value.trim() || !currentChat) return;
            const messageText = input.value.trim();
            const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            currentChat.messages.push({
                text: messageText,
                time: now,
                type: 'out'
            });
            saveData();
            renderChatModal();
            input.value = '';

            // Отправляем уведомление собеседнику (если это не системный чат)
            if (currentChat.with !== SYSTEM_USER_ID) {
                const targetUserId = currentChat.with;
                const fromName = currentUser.name;
                sendNotificationToBot(targetUserId, 'new_message', { fromName, message: messageText });
            }
        }

        // В approveItem добавляем отправку уведомления
        function approveItem() {
            if (!currentModerateItem) return;
            currentModerateItem.moderation = 'approved';
            saveData();
            render();
            closeModerate();
            showAdmin();
            toast('✅ Товар одобрен');
            const sellerId = currentModerateItem.sellerId;
            sendSystemNotification(sellerId, `✅ Ваш товар "${currentModerateItem.title}" одобрен и опубликован!`);
            sendNotificationToBot(sellerId, 'item_approved', { title: currentModerateItem.title });
        }

        // В rejectItemWithReason добавляем отправку уведомления
        function rejectItemWithReason() {
            if (!currentModerateItem) return;
            const reason = document.getElementById('rejectReason').value.trim();
            if (!reason) {
                toast('❌ Укажите причину отказа');
                return;
            }
            if (currentModerateItem.premium) {
                const seller = users[currentModerateItem.sellerId];
                if (seller) {
                    seller.stars += 15;
                    const trans = JSON.parse(localStorage.getItem(`avito_trans_${currentModerateItem.sellerId}`) || '[]');
                    trans.unshift({ desc: `Возврат за отклонённый премиум: ${currentModerateItem.title}`, date: new Date().toLocaleDateString(), amount: 15 });
                    localStorage.setItem(`avito_trans_${currentModerateItem.sellerId}`, JSON.stringify(trans));
                    saveData();
                }
            }
            currentModerateItem.moderation = 'rejected';
            currentModerateItem.rejectReason = reason;
            items = items.filter(i => i.id !== currentModerateItem.id);
            saveData();
            render();
            closeModerate();
            showAdmin();
            toast('❌ Товар отклонён');
            const sellerId = currentModerateItem.sellerId;
            sendSystemNotification(sellerId, `❌ Ваш товар "${currentModerateItem.title}" отклонён.\nПричина: ${reason}`);
            sendNotificationToBot(sellerId, 'item_rejected', { title: currentModerateItem.title, reason });
        }

        // В confirmBlock можно добавить уведомление при блокировке (но оно уже есть через sendSystemNotification)
        // В остальном все функции остаются без изменений.

        // ---------- Инициализация ----------
        function initFilters() {
            const row = document.getElementById('filterRow');
            row.innerHTML = '<span class="filter active" data-cat="all" onclick="filterCat(\'all\')">🌟 Все</span>' +
                CATEGORIES.map(c => `<span class="filter" data-cat="${c.id}" onclick="filterCat('${c.id}')">${c.name}</span>`).join('');
        }

        function recalcLikes() { /* ... */ }
        function render() { /* ... */ }
        function filterCat(id) { /* ... */ }
        function doSearch() { /* ... */ }
        function handlePhoto(e) { /* ... */ }
        function togglePremium() { /* ... */ }
        let editingItemId = null;
        function openAdd(itemId = null) { /* ... */ }
        function closeAdd() { /* ... */ }
        function validateAddForm() { /* ... */ }
        function submitItem() { /* ... */ }
        function openDetail(id) { /* ... */ }
        function closeDetail() { /* ... */ }
        function toggleFav(id) { /* ... */ }
        function showFavorites() { /* ... */ }
        function closeFavorites() { /* ... */ }
        let currentChat = null;
        function openChat(sellerId) { /* ... */ }
        function renderChatModal() { /* ... */ }
        function closeChatDetail() { /* ... */ }
        function showChats() { /* ... */ }
        function closeChats() { /* ... */ }
        function showReferrals() { /* ... */ }
        function closeReferrals() { /* ... */ }
        function showMyItems() { /* ... */ }
        function closeMyItems() { /* ... */ }
        function deleteItem(id) { /* ... */ }
        let currentModerateItem = null;
        function showAdmin() { /* ... */ }
        function closeAdmin() { /* ... */ }
        function openModerate(id) { /* ... */ }
        function closeModerate() { /* ... */ }
        let currentBlockUserId = null;
        function openBlockUser(uid) { /* ... */ }
        function closeBlock() { /* ... */ }
        function confirmBlock() { /* ... */ }
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }
        function closeMenu() { document.getElementById('menu').classList.remove('show'); }

        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

        window.onload = () => {
            initFilters();
            render();
            updateUI();
            document.getElementById('addCategory').innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('menu');
                if (menu && !menu.contains(e.target) && !e.target.closest('.profile')) menu.classList.remove('show');
            });
            toast(`👋 Добро пожаловать, ${currentUser.name}!`);
        };
    </script>
</body>
</html>
